<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>VK Авто-отчёт</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <header class="row-anim" style="--i:0">
      <div class="logo">✓</div>
      <div>
        <h1>VK Авто-отчёт</h1>
        <p class="subtitle">отчёт в чат — сам, вовремя</p>
      </div>
      <label class="switch" title="Автоотправка">
        <input type="checkbox" id="enabled">
        <span class="track"><span class="thumb"></span></span>
      </label>
    </header>

    <section class="card row-anim" style="--i:1">
      <label class="field">
        <span class="field-name">Чат</span>
        <input type="text" id="peerId" placeholder="2000000066, c15 или durov">
        <small>значение <code>sel=…</code> из адреса vk.ru/im</small>
      </label>
    </section>

    <section class="card row-anim" style="--i:2">
      <div class="field">
        <span class="field-name">Расписание</span>
        <div class="schedule">
          <input type="time" id="time" value="18:00">
          <div class="days" id="days">
            <label class="chip"><input type="checkbox" value="1" checked><span>Пн</span></label>
            <label class="chip"><input type="checkbox" value="2" checked><span>Вт</span></label>
            <label class="chip"><input type="checkbox" value="3" checked><span>Ср</span></label>
            <label class="chip"><input type="checkbox" value="4" checked><span>Чт</span></label>
            <label class="chip"><input type="checkbox" value="5" checked><span>Пт</span></label>
            <label class="chip"><input type="checkbox" value="6"><span>Сб</span></label>
            <label class="chip"><input type="checkbox" value="0"><span>Вс</span></label>
          </div>
        </div>
      </div>
    </section>

    <section class="card row-anim" style="--i:3">
      <label class="field">
        <span class="field-name">Шаблон отчёта</span>
        <textarea id="template" rows="8"></textarea>
        <small>значения в <code>{…}</code> подтягиваются с портала МТС;
        <code>{date}</code>/<code>{time}</code> — текущие дата и время
        · <a href="#" id="resetTemplate">вернуть стандартный</a></small>
      </label>
    </section>

    <div class="buttons row-anim" style="--i:4">
      <button id="save" class="btn primary"><span class="btn-label">Сохранить</span></button>
      <button id="sendNow" class="btn ghost">
        <span class="spinner"></span>
        <span class="btn-label">Отправить сейчас</span>
      </button>
    </div>

    <div class="buttons">
      <button id="preview" class="btn ghost small">
        <span class="spinner"></span>
        <span class="btn-label">Проверить данные с портала</span>
      </button>
    </div>

    <pre id="previewBox" hidden></pre>

    <p id="status" class="row-anim" style="--i:5"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
