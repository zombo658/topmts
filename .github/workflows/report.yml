name: Отправка отчётов в ВК (облако)

# ВНИМАНИЕ: проверено — портал inventory.ural.mts.ru НЕ доступен из облака
# GitHub (серверы за границей, портал блокирует зарубежные IP: соединение
# отпадает по таймауту). Поэтому запуск по расписанию ОТКЛЮЧЁН — иначе он
# падал бы каждый день. Этот скрипт работает только если запускать его с
# машины/VPS внутри России (см. automation/README.md). Оставлен ручной
# запуск для такого случая.

on:
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Отправить отчёты
        run: node automation/send-report.js
        env:
          EMPLOYEES: ${{ secrets.EMPLOYEES }}
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_PEER: ${{ secrets.VK_PEER }}
          DAYS: ${{ vars.DAYS }}
          TZ_OFFSET: ${{ vars.TZ_OFFSET }}
