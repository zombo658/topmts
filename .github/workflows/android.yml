name: Сборка Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза, например v1.0.0'
        default: 'v1.0.0'
  push:
    branches:
      - main
      - 'claude/**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Компоненты SDK
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Собрать debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Переименовать APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk otchet-mts-vk.apk

      - name: Выложить APK артефактом
        uses: actions/upload-artifact@v4
        with:
          name: otchet-mts-vk-apk
          path: otchet-mts-vk.apk
          if-no-files-found: error

      - name: Опубликовать релиз с APK
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: otchet-mts-vk.apk
          name: Отчёт МТС→ВК ${{ github.event.inputs.version || github.ref_name }}
          body: |
            Приложение для Android: автоматический отчёт с портала МТС в чат ВК.

            **Установка:** скачайте `otchet-mts-vk.apk` ниже, откройте на телефоне,
            разрешите установку из этого источника. Настройка — в `android/README.md`.

            Другие варианты (расширение для ПК, облако для iPhone) — см. README репозитория.
